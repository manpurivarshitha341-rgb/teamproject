<!DOCTYPE html>
<html>
<head>
    <title>Vote</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/vote/">Voting</a>
        <a class="text-white" href="/vote/results/">Results</a>
    </div>
</nav>

<div class="container mt-5">

<h2 class="text-center mb-4">Biometric Voting System</h2>

<div class="card p-4 shadow">

<!-- STEP 1: Scan Face -->
<h5>Step 1: Scan Face</h5>

<video id="video" width="100%" height="250" autoplay class="mb-3 border"></video>

<button class="btn btn-primary w-100 mb-2" onclick="startCamera()">Start Camera</button>
<button class="btn btn-warning w-100 mb-3" onclick="verify()">Capture & Verify</button>

<p id="status" class="text-success"></p>

<hr>

<!-- STEP 2: Voting Form (Hidden Initially) -->
<div id="voteSection" style="display:none;">

<form method="POST">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Enter Voter ID</label>
        <input type="text" name="voter_id" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Select Candidate</label>

        <select name="candidate" class="form-control" required>
            {% for c in candidates %}
                <option value="{{c.id}}">
                    {{c.name}} - {{c.party}}
                </option>
            {% endfor %}
        </select>
    </div>

    <button class="btn btn-success w-100">
        Submit Vote
    </button>
</form>

</div>

</div>
</div>

<script>
function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
            document.getElementById('video').srcObject = stream;
        })
        .catch(error => {
            alert("Camera not working!");
        });
}

function verify() {
    // TEMP: Fake verification
    document.getElementById("status").innerText = "Face Verified ✅";

    // Show voting form after verification
    document.getElementById("voteSection").style.display = "block";
}
</script>

</body>
</html>
