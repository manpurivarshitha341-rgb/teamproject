<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Biometric Voting System</h2>

<p>{{message}}</p>

<form method="POST">

{% csrf_token %}

<label>Enter Voter ID</label>
<input type="text" name="voter_id">

<br><br>

<label>Select Candidate</label>

<select name="candidate">

{% for c in candidates %}

<option value="{{c.id}}">
{{c.name}} - {{c.party}}
</option>

{% endfor %}

</select>

<br><br>

<button type="submit">Vote</button>

</form>
</body>
</html>
