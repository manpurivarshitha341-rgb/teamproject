<!DOCTYPE html>
<html>
<head>

<title>Vote</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand" href="/vote/">Voting</a>

<a class="text-white" href="/vote/results/">Results</a>

</div>

</nav>

<div class="container mt-5">

<h2 class="text-center mb-4">Biometric Voting System</h2>

<div class="card p-4 shadow">

<p class="text-danger">{{message}}</p>

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<label class="form-label">Enter Voter ID</label>
<input type="text" name="voter_id" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Select Candidate</label>

<select name="candidate" class="form-control">

{% for c in candidates %}

<option value="{{c.id}}">
{{c.name}} - {{c.party}}
</option>

{% endfor %}

</select>

</div>

<button class="btn btn-success w-100">
Submit Vote
</button>

</form>

</div>

</div>

</body>
</html>
