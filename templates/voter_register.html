<!DOCTYPE html>
<html>
<head>
<title>Register Voter</title>

<style>

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:linear-gradient(135deg,#e3f2fd,#f8f9fa);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:35px;
    border-radius:18px;
    width:420px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#444;
}

input, select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ddd;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#90caf9;
}

button{
    width:100%;
    padding:12px;
    background:#bbdefb;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#90caf9;
}

.back{
    display:block;
    text-align:center;
    margin-top:15px;
    text-decoration:none;
    color:#666;
}

</style>
</head>

<body>

<div class="container">

<h2>🧑 Register Voter</h2>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<input type="text" name="voter_id" placeholder="Voter ID" required>

<input type="text" name="name" placeholder="Full Name" required>

<input type="number" name="age" placeholder="Age" required>

<select name="gender" required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>



<button type="submit">Register Voter</button>

</form>

<a href="/" class="back">⬅ Back to Dashboard</a>

</div>

</body>
</html>
