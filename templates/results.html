{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Voting Results</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family: Arial;
    background:#f5f9ff;
    text-align:center;
}

.container{
    width:650px;
    margin:auto;
    margin-top:60px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px #ddd;
}

h2{
    margin-bottom:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>📈 Voting Results</h2>

<canvas id="lineChart"></canvas>

<br><br>

<a href="/">Back to Dashboard</a>

</div>

<script>

const names = JSON.parse('{{ names|escapejs }}');
const votes = JSON.parse('{{ votes|escapejs }}');

new Chart(document.getElementById("lineChart"),{

type:'line',

data:{
labels:names,
datasets:[{
label:'Votes',
data:votes,
borderColor:'#64b5f6',
backgroundColor:'#bbdefb',
fill:true,
tension:0.3
}]
},

options:{
scales:{
y:{
beginAtZero:true
}
}
}

});

</script>

</body>
</html>
