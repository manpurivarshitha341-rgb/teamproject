<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Election Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/vote/">Voting</a>
        <a class="text-white" href="/vote/results/">Results</a>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="text-center mb-4">Election Results</h2>

    <table class="table table-bordered table-striped">
        <tr class="table-dark">
            <th>Candidate</th>
            <th>Party</th>
            <th>Total Votes</th>
        </tr>
        {% for r in data %}
        <tr>
            <td>{{ r.name }}</td>
            <td>{{ r.party }}</td>
            <td>{{ r.votes }}</td>
        </tr>
        {% endfor %}
    </table>

    <h3 class="mt-5">Vote Chart</h3>
    <canvas id="voteChart"></canvas>
</div>

<script>
const labels = [
{% for r in data %}
    "{{ r.name }}"{% if not loop.last %},{% endif %}
{% endfor %}
];

const votes = [
{% for r in data %}
    {{ r.votes }}{% if not loop.last %},{% endif %}
{% endfor %}
];

const ctx = document.getElementById("voteChart").getContext('2d');

new Chart(ctx, {
    type: "bar",
    data: {
        labels: labels,
        datasets: [{
            label: "Votes",
            data: votes
        }]
    }
});
</script>
</body>
</html>
