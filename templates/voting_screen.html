{% load static %}

<!DOCTYPE html>
<html>
<head>
<title>Biometric Voting System</title>
</head>

<body>

<h2>Biometric Voting System</h2>

<h3>Live Camera</h3>

<video id="video" width="400" height="300" autoplay></video>

<br><br>

<button id="capture">Capture Face</button>

<canvas id="canvas" width="400" height="300" style="display:none;"></canvas>

<form method="POST">

{% csrf_token %}

<input type="hidden" id="captured_image" name="captured_image">

<br><br>

Enter Voter ID
<input type="text" name="voter_id">

<br><br>

Select Candidate
<select name="candidate">

{% for c in candidates %}
<option value="{{c.id}}">
{{c.name}} - {{c.party}}
</option>
{% endfor %}

</select>

<br><br>

<button type="submit">Vote</button>

</form>

<script src="{% static 'js/camera.js' %}"></script>

</body>
</html>
