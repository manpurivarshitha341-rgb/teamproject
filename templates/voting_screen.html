{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Start Voting</title>

<style>
body{
font-family:Arial;
background:#f5f9ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
width:400px;
border-radius:10px;
box-shadow:0 0 10px #ddd;
}

video{
width:100%;
margin-top:10px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#64b5f6;
border:none;
color:white;
border-radius:5px;
}
</style>

</head>

<body>

<div class="container">

<h2>🗳 Start Voting</h2>

<form method="POST" action="/submit-vote/">
{% csrf_token %}

<input type="text" name="voter_id" placeholder="Enter Voter ID" required>

<br><br>

<select name="candidate" required>

<option value="">Select Candidate</option>

{% for c in candidates %}
<option value="{{ c.id }}">{{ c.name }} - {{ c.party }}</option>
{% endfor %}

</select>

<video id="video" autoplay></video>

<button type="button" onclick="scanFace()">Scan Face</button>

<button type="submit">Submit Vote</button>

</form>

<a href="/">Back to Dashboard</a>

</div>

<script>

const video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject = stream;
});

function scanFace(){

fetch("/scan-face/",{
method:"POST"
})
.then(res=>res.json())
.then(data=>{
alert(data.message);
});

}

</script>

</body>
</html>
